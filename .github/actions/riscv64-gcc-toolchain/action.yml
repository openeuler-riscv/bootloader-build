name: 'RISCV64 GCC Toolchains'
description: 'Setup GCC Toolchains for RISCV64 Target'
outputs:
  full-prefix:
    description: "Full path prefix of installed toolchain, suitable for CROSS_COMPILE"
    value: /opt/riscv-gnu-toolchain/bin/riscv64-unknown-linux-gnu-
runs:
  using: "composite"
  steps:
    - name: Install Dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential coccinelle \
          device-tree-compiler dfu-util efitools flex gdisk graphviz imagemagick \
          libgnutls28-dev libguestfs-tools libncurses-dev \
          libpython3-dev libsdl2-dev libssl-dev lz4 lzma lzma-alone openssl \
          pkg-config python3 python3-asteval python3-coverage python3-filelock \
          python3-pkg-resources python3-pycryptodome python3-pyelftools \
          python3-pytest python3-pytest-xdist python3-sphinxcontrib.apidoc \
          python3-sphinx-rtd-theme python3-subunit python3-testtools \
          python3-venv swig uuid-dev u-boot-tools
    - name: Cache RISCV64 GCC Toolchain
      id: cache-riscv64-gcc-toolchain
      uses: actions/cache@v5
      with:
        path: /opt/riscv-gnu-toolchain
        key: gcc-riscv64-glibc-ubuntu-24.04-${{ hashFiles('/tmp/riscv64-gcc.tar.xz') }}
        restore-keys: |
          gcc-riscv64-glibc-ubuntu-24.04
    - name: Setup RISCV64 GCC Toolchain
      if: ${{ steps.cache-riscv64-gcc-toolchain.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        curl -L "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2026.02.13/riscv64-glibc-ubuntu-24.04-gcc.tar.xz" -o /tmp/riscv64-gcc.tar.xz
        mkdir -p /opt/riscv-gnu-toolchain
        sudo tar -xvf /tmp/riscv64-gcc.tar.xz --strip-components 1 -C /opt/riscv-gnu-toolchain
